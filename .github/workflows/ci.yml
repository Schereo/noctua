name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Tests laufen unter System-Node — better-sqlite3 gegen dessen ABI bauen
      # (postinstall baut zunächst gegen Electron).
      - name: Rebuild native module for Node
        run: npm rebuild better-sqlite3

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test:ci
